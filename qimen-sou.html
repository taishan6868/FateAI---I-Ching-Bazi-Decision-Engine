    <script>
      let form,
        laydate,
        table,
        layer = null
      let WUXING = ['木', '火', '土', '金', '水']
      let GAN = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸']
      let GAN_SELECT = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸']
      let GAN_WUXING_IDX = [0, 0, 1, 1, 2, 2, 3, 3, 4, 4]
      let WANG_SHUAI = ['胎', '养', '长生', '沐浴', '冠带', '临官', '帝旺', '衰', '病', '死', '墓', '绝']
      let WANG_SHUAI_LABEL = ['B+10', 'A+15', 'S+30', 'BB+25', 'AA+30', 'SS+60', 'SSS+90', 'X-15', 'Y-30', 'XX-45', 'XY-60', 'XXX-80']
      // let startTime, endTime

      $(document).ready(function () {
        // 获取用户名
        $('.loginname').html(window.localStorage.getItem('username'))
        init()
        checkIsVip()
      })
      function init() {
        layui.use(['laydate', 'form', 'layer', 'table'], function () {
          laydate = layui.laydate
          form = layui.form
          layer = layui.layer
          table = layui.table
          form.verify({
            birthdayDate: [/^\s*\d{4}\s*\d{2}\s*\d{2}\s*\d{2}\s*\d{2}\s*\d{2}\s*[+-]?$/, '日期格式不正确，请检查']
          })

          form.on('select(qiMenSelectChange)', function (data) {
            console.log(data.value) //复选框value值，也可以通过data.elem.value得到
            if (data.value == '时家') {
              $('.ding-ju-select').html(`<option value="拆补">拆补</option>
              <option value="置润1(大于9天)">置润1(大于9天)</option>
              <option value="置润2(大于等于9天)">置润2(大于等于9天)</option>
              <option value="茅道">茅道</option>
              <option value="阴盘">阴盘</option>`)
            } else {
              $('.ding-ju-select').html(`<option value="默认">默认</option>`)
            }
            form.render('select')
          })
        })
      }

      function compare() {
        return function (a, b) {
          return a.timeBean.date.getTime() - b.timeBean.date.getTime()
        }
      }

      var trim = function (s) {
        return s.replace(/(^\s*)|(\s*$)/g, '')
      }
      function onDateTimeStrInput(css_selector = '#startTime') {
        let v = $(css_selector).val()
        // console.log(css_selector)
        if (!/^\s*\d{4}\s*\d{2}\s*\d{2}\s*\d{2}\s*\d{2}\s*\d{2}\s*[+-]?$/.test(v)) {
          $(css_selector).addClass('error-input')
          return
        }
        $(css_selector).removeClass('error-input')
        v = trim(v)
        var year = parseInt(v.substr(0, 4))
        v = v.substr(4)
        var month = parseInt(v.substr(0, 2), 10)
        v = trim(v.substr(2))
        var day = parseInt(v.substr(0, 2), 10)
        v = trim(v.substr(2))
        var hour = parseInt(v.substr(0, 2), 10)
        v = trim(v.substr(2))
        var minute = parseInt(v.substr(0, 2), 10)
        v = trim(v.substr(2))
        var second = parseInt(v.substr(0, 2), 10)
        v = trim(v.substr(2))
        var gender = '男'
        if ('+' == v) {
          gender = '男'
        } else if ('-' == v) {
          gender = '女'
        }
        if (month < 10) month = '0' + month
        if (day < 10) day = '0' + day
        if (hour < 10) hour = '0' + hour
        if (minute < 10) minute = '0' + minute
        if (second < 10) second = '0' + second
        // console.log(year, month, day, hour, minute, second, gender)
        // let cTimeData = {
        //   year: year,
        //   month: month,
        //   date: day,
        //   hours: hour,
        //   minutes: minute,
        //   seconds: second
        // }
        // let cTimeData = new Date(`${year}-${month}-${day} ${hour}:${minute}:${second}`)
        // startTime = cTimeData
        // if (css_selector.indexOf('endTime') != -1) {
        //   endTime = cTimeData
        // }
      }

      function getDateByStr(v) {
        v = trim(v)
        var year = parseInt(v.substr(0, 4))
        v = v.substr(4)
        var month = parseInt(v.substr(0, 2), 10)
        v = trim(v.substr(2))
        var day = parseInt(v.substr(0, 2), 10)
        v = trim(v.substr(2))
        var hour = parseInt(v.substr(0, 2), 10)
        v = trim(v.substr(2))
        var minute = parseInt(v.substr(0, 2), 10)
        v = trim(v.substr(2))
        var second = parseInt(v.substr(0, 2), 10)
        v = trim(v.substr(2))
        return new Date(`${year}-${month}-${day} ${hour}:${minute}:${second}`)
      }

      function onSouPanClick() {
        layer.open({
          type: 1,
          title: '搜盘',
          content: $('.sou-pan-dialog'),
          cancel: function (index, layero) {
            $('.sou-pan-dialog').css({ display: 'none' })
          }
        })
      }

      async function onPaiPanClick() {
        const userInfoResp = await sendRequest({
          url: `api/user/getUserInfo`,
          type: `get`
        })
        let isVip = userInfoResp && userInfoResp.data && userInfoResp.data.isMember
        if (!isVip) {
          onOpenVipTips()
          return
        }
        window.location.href = 'qimen/index.html'
      }
      async function onSouPanSearch() {
        const userInfoResp = await sendRequest({
          url: `api/user/getUserInfo`,
          type: `get`
        })
        let isVip = userInfoResp && userInfoResp.data && userInfoResp.data.isMember
        if (!isVip) {
          onOpenVipTips()
          return
        }

        let fields = form.val('form-sou-pan')
        var arr = new Array()
        $("input:checkbox[name='geju']:checked").each(function (i) {
          arr[i] = $(this).val()
        })
        fields.geJu = arr //将数组合并成字符串
        console.log('submit(formSouPan)', fields)

        if (!/^\s*\d{4}\s*\d{2}\s*\d{2}\s*\d{2}\s*\d{2}\s*\d{2}\s*[+-]?$/.test(fields.startTime)) {
          layer.msg('请输入正确的开始时间')
          return false
        }

        if (!/^\s*\d{4}\s*\d{2}\s*\d{2}\s*\d{2}\s*\d{2}\s*\d{2}\s*[+-]?$/.test(fields.endTime)) {
          layer.msg('请输入正确的结束时间')
          return false
        }
        //表单校验
        if (parseInt(fields.startTime) > parseInt(fields.endTime)) {
          layer.msg('开始时间不能大于结束时间！')
          return false
        }

        let lineCount = 30
        if (fields.lineCount) {
          lineCount = parseInt(fields.lineCount)
        }

        let startTime = getDateByStr(fields.startTime)
        let endTime = getDateByStr(fields.endTime)

        try {
          $('.search').css({ display: 'none' })
          $('.search-loading').css({ display: 'inline-block' })

          await new Promise(resolve => setTimeout(resolve))

          let times = []
          GAN.map(gan => {
            WANG_SHUAI.map(ws => {
              let time = window.souJu(
                startTime,
                endTime,
                fields.qiMen,
                fields.dingJu,
                fields.tiaoJian,
                fields.gongWei,
                fields.shenPan,
                fields.jiuXing,
                fields.baMen,
                gan,
                ws,
                fields.diPanGan,
                fields.diPanGanWangShuai,
                fields.geJu,
                {
                  longitude: 116.3979471,
                  birthPlace: '未知',
                  isMan: fields.sex == '男' ? true : false,
                  isZTY: false,
                  wenShi: ''
                }
              )
              if (time) {
                time.map(t => {
                  t.ganIdx = GAN.findIndex(item => {
                    return item === gan
                  })
                  t.wsIdx = WANG_SHUAI.findIndex(item => {
                    return item === ws
                  })
                })
                times = times.concat(time)
              }
            })
          })
          times.sort(compare())
          console.log(times)
          renderTimes(times, fields.showText == '0' ? false : true, lineCount)

          $('.search').css({ display: 'inline-block' })
          $('.search-loading').css({ display: 'none' })

          layer.open({
            type: 1,
            title: '搜盘结果',
            content: $('.sou-pan-result'),
            cancel: function (index, layero) {
              $('.sou-pan-result').css({ display: 'none' })
            }
          })
        } catch (e) {
          console.log(e)
        }

        // console.log(
        //   'y',
        //   window.souJu(
        //     startTime,
        //     endTime,
        //     fields.qiMen,
        //     fields.DingJu,
        //     fields.tiaoJian,
        //     fields.gongWei,
        //     fields.shenPan,
        //     fields.jiuXing,
        //     fields.baMen,
        //     '乙',
        //     '临官',
        //     fields.diPanGan,
        //     fields.diPanGanWangShuai,
        //     fields.geJu,
        //     {
        //       longitude: 116.3979471,
        //       birthPlace: '未知',
        //       isMan: fields.sex == '男' ? true : false,
        //       isZTY: false,
        //       wenShi: ''
        //     }
        //   )
        // )

        return false
      }
      function renderTimes(times, showText = 0, subLen = 30) {
        let newTimes = getNewArray(times, subLen)
        let htmls = []
        newTimes.map(time => {
          let souPanItemHtmls = []
          time.map(t => {
            if (showText) {
              souPanItemHtmls.push(
                `<div class="sou-pan-i w${GAN_WUXING_IDX[t.ganIdx]} s${t.wsIdx}">${t.title} ${GAN[t.ganIdx]} ${
                  WANG_SHUAI_LABEL[t.wsIdx]
                }</div>`
              )
            } else {
              souPanItemHtmls.push(`<div class="sou-pan-i w${GAN_WUXING_IDX[t.ganIdx]} s${t.wsIdx}">${t.title}</div>`)
            }
          })
          htmls.push(`<div class="sou-pan-items">${souPanItemHtmls.join('')}</div>`)
        })
        $('.sou-pans').html(htmls.join(''))
        // let htmls = []
        // times.map(t => {
        //   if (showText) {
        //     htmls.push(
        //       `<div class="sou-pan-i w${GAN_WUXING_IDX[t.ganIdx]} s${t.wsIdx}">${t.title} ${GAN[t.ganIdx]} ${WANG_SHUAI[t.wsIdx]}</div>`
        //     )
        //   } else {
        //     htmls.push(`<div class="sou-pan-i w${GAN_WUXING_IDX[t.ganIdx]} s${t.wsIdx}">${t.title}</div>`)
        //   }
        // })
        // $('.sou-pans').html(htmls.join(''))
      }
      function getNewArray(array, subGroupLength) {
        let index = 0
        let newArray = []
        while (index < array.length) {
          newArray.push(array.slice(index, (index += subGroupLength)))
        }
        return newArray
      }

      function onSaveToImage() {
        cut_pic('souPanResult')
      }
      //截图
      function cut_pic(cid) {
        const shareContent = document.getElementById(cid)
        const width = shareContent.offsetWidth
        const height = shareContent.offsetHeight
        const canvas = document.createElement('canvas')
        const scale = 1

        canvas.width = width * scale
        canvas.height = height * scale
        canvas.getContext('2d').scale(scale, scale)

        const opts = {
          scale: scale,
          canvas: canvas,
          logging: true,
          width: width,
          height: height,
          useCORS: true
        }

        html2canvas(shareContent, opts).then(function (canvas) {
          const context = canvas.getContext('2d')

          context.mozImageSmoothingEnabled = false
          context.webkitImageSmoothingEnabled = false
          context.msImageSmoothingEnabled = false
          context.imageSmoothingEnabled = false
          const img = Canvas2Image.saveAsImage(canvas, canvas.width, canvas.height, parseInt(new Date().getTime() / 1000) + '.jpg')

          // const t = '#' + cid
          // $(t).html(img)
          // $(img).css({
          //   width: canvas.width + 'px',
          //   height: canvas.height + 'px'
          // })
        })
      }

      async function checkIsVip() {
        const userInfoResp = await sendRequest({
          url: `api/user/getUserInfo`,
          type: `get`
        })
        if (userInfoResp && userInfoResp.data && userInfoResp.data.isMember) {
          $('.user-info-api-img').html('<img src="./images/vip.png" alt="" />')
        }
      }
      function onOpenVipTips() {
        layer.confirm(
          '仅需1680元VIP即可开启刑冲，奇门遁甲，神煞，紫薇，六爻，大六壬等权限',
          {
            btn: ['立即开启', '取消']
          },
          async function (index, layero) {
            //按钮【按钮一】的回调
            const orderPayResp = await sendRequest({
              url: `api/order/pay`,
              type: `get`
            })

            if (orderPayResp) {
              layer.confirm(
                '是否完成支付？',
                {
                  btn: ['已经支付', '未完成']
                },
                async function (index, layero) {
                  window.location.reload()
                },
                function (index) {
                  layer.close(index)
                }
              )

              let form = orderPayResp
              const div = document.createElement('formdiv')
              div.innerHTML = form
              document.body.appendChild(div)
              for (let index = 0; index < document.forms.length; index++) {
                const element = document.forms[index]
                if (element.name == 'punchout_form') {
                  element.setAttribute('target', '_blank')
                  element.submit()
                  div.remove()
                }
              }
            }
          },
          function (index) {
            layer.close(index)
          }
        )
      }
      // 退出登录
      function logout() {
        layer.confirm('确定要退出登录吗?', function (index) {
          sendRequest({
            method: 'GET',
            url: '/api/user/userLogout'
          }).then(res => {
            if (res.code == 200) {
              window.localStorage.removeItem('token')
              window.localStorage.removeItem('username')
              window.location.href = 'login.html'
            }
            layer.close(index)
          })
        })
      }
    </script>
